<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LIFTED</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="LIFTED">
  <style>
/* ══ Theme ════════════════════════════════════════════════ */
:root {
  --bg:          #f2f2f7;
  --surface:     #ffffff;
  --surface2:    #f2f2f7;
  --border:      #e0e0e5;
  --text:        #1a1a1a;
  --text-muted:  #8e8e93;
  --blue:        #2563eb;
  --green:       #16a34a;
  --green-dark:  #166534;
  --red:         #dc2626;
  --gold:        #f59e0b;
  --header-bg:   #ffffff;
  --header-text: #111111;
  --shadow:      0 1px 4px rgba(0,0,0,.10), 0 2px 10px rgba(0,0,0,.06);
  --shadow-lg:   0 4px 24px rgba(0,0,0,.14);
}
[data-theme="dark"] {
  --bg:          #000000;
  --surface:     #1c1c1e;
  --surface2:    #2c2c2e;
  --border:      #3a3a3c;
  --text:        #f5f5f7;
  --text-muted:  #8e8e93;
  --header-bg:   #0a0a0a;
  --header-text: #ffffff;
  --shadow:      0 1px 4px rgba(0,0,0,.4), 0 2px 10px rgba(0,0,0,.3);
  --shadow-lg:   0 4px 24px rgba(0,0,0,.5);
}

/* ══ Reset ════════════════════════════════════════════════ */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  max-width: 600px;
  margin: 0 auto;
  -webkit-tap-highlight-color: transparent;
}
button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; }

/* ══ Header ══════════════════════════════════════════════ */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--header-bg);
  color: var(--header-text);
  padding: 14px 20px;
  box-shadow: 0 1px 0 rgba(0,0,0,.07);
  text-align: center;
}
#app-title {
  font-size: 1.75rem; font-weight: 900;
  letter-spacing: 5px; color: var(--header-text);
}
#hdr-back {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--header-text);
  font-size: 1.5rem; line-height: 1; padding: 6px;
  display: none; align-items: center; gap: 4px;
  transition: opacity .15s;
}
#hdr-back:active { opacity: .5; }
body[data-screen="session"] #hdr-back { display: flex; }
#hdr-right {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  display: flex; align-items: center; gap: 2px;
}
#hdr-star {
  background: none; border: none; color: var(--text-muted);
  font-size: 1.4rem; line-height: 1; padding: 6px;
  display: none; transition: color .2s;
}
#hdr-star.active { color: var(--gold); }
body[data-screen="session"] #hdr-star { display: block; }
#hdr-edit {
  background: none; border: none; color: var(--header-text);
  font-size: 1rem; line-height: 1; padding: 6px 4px;
  display: none; opacity: .5; cursor: pointer; transition: opacity .2s, color .2s;
}
#hdr-edit.active { opacity: 1; color: var(--gold); }
body[data-screen="session"] #hdr-edit { display: block; }
/* View-mode hides entry form and insert buttons */
body[data-edit="false"] #current-ex { display: none !important; }
body[data-edit="false"] .insert-set-btn { display: none !important; pointer-events: none; }
#edit-mode-banner {
  display: none; margin-bottom: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 12px;
  font-size: .82rem; color: var(--text-muted); text-align: center;
}
body[data-edit="false"] #edit-mode-banner { display: block; }
#settings-btn {
  background: none; border: none; color: var(--header-text);
  padding: 6px; line-height: 1; opacity: .85; transition: opacity .15s;
}
#settings-btn:active { opacity: .5; }
#settings-btn svg { display: block; width: 26px; height: 26px; }

/* ══ Screens ══════════════════════════════════════════════ */
.screen { display: none; }
.screen.active { display: block; }

/* ══ History Screen ═══════════════════════════════════════ */
#screen-history { padding: 14px 14px 80px; display: none; flex-direction: column; gap: 14px; }
#screen-history.active { display: flex; }

.hist-section-label {
  font-size: .7rem; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-muted);
  padding: 0 4px; margin-top: 8px; margin-bottom: 6px;
}
.hist-empty {
  text-align: center; padding: 32px 20px;
  color: var(--text-muted); font-size: .95rem;
  background: var(--surface); border-radius: 14px;
  box-shadow: var(--shadow);
}

/* Session card in history */
.sess-wrap {
  position: relative; overflow: hidden;
  border-radius: 14px; box-shadow: var(--shadow);
}
.sess-row {
  background: var(--surface);
  display: flex; align-items: stretch;
  transition: transform .2s cubic-bezier(.4,0,.2,1);
}
.sess-card-body {
  flex: 1; padding: 14px 16px; cursor: pointer;
  min-width: 0;
}
.sess-card-body:active { opacity: .7; }
.sess-name {
  font-weight: 700; font-size: 1rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 4px;
}
.sess-name.untitled { color: var(--text-muted); font-style: italic; font-weight: 400; }
.sess-meta { font-size: .78rem; color: var(--text-muted); }
.sess-star-btn {
  flex-shrink: 0; background: none; border: none;
  color: var(--text-muted); font-size: 1.4rem;
  padding: 0 10px 0 4px; transition: color .2s;
  display: flex; align-items: center;
}
.sess-star-btn.active { color: var(--gold); }
/* Inline trash — always visible */
.sess-del-btn {
  flex-shrink: 0; background: none; border: none;
  color: var(--text-muted); font-size: 1.1rem;
  padding: 0 14px 0 4px;
  display: flex; align-items: center;
  cursor: pointer; transition: color .15s;
}
.sess-del-btn:hover { color: var(--red); }
/* Swipe-reveal — mobile only (set rows) */

/* ══ Session Screen ═══════════════════════════════════════ */
#screen-session { display: none; }
#screen-session.active { display: block; }
#session-main {
  padding: 14px 14px 120px;
  display: flex; flex-direction: column; gap: 12px;
}

/* Session header card (name + date + copy btn) */
#session-hdr-card {
  background: var(--surface); border-radius: 14px;
  overflow: hidden; box-shadow: var(--shadow);
}
#workout-name-input {
  width: 100%; border: none;
  background: var(--surface2); color: var(--text);
  font-size: 1.1rem; font-weight: 700;
  padding: 14px 16px; outline: none;
  border-bottom: 1px solid var(--border);
}
#workout-name-input::placeholder { color: var(--text-muted); font-weight: 400; }
#session-meta-row {
  padding: 9px 16px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: .8rem; color: var(--text-muted);
}
#open-copy-btn {
  background: none; border: 1px solid var(--border); border-radius: 7px;
  color: var(--blue); font-size: .78rem; font-weight: 600;
  padding: 5px 10px; cursor: pointer; transition: opacity .15s;
  display: none;
}
#open-copy-btn:active { opacity: .6; }
#open-copy-btn.show { display: block; }

/* ══ Exercise Cards ═══════════════════════════════════════ */
.ex-card {
  background: var(--surface); border-radius: 14px;
  overflow: hidden; box-shadow: var(--shadow);
}
.ex-card-title {
  padding: 13px 16px; font-weight: 700; font-size: 1rem;
  background: var(--surface2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; color: var(--text);
}
.ex-card-title.untitled { color: var(--text-muted); font-weight: 400; font-style: italic; }
.ex-card-title span.title-text { flex: 1; cursor: text; }
.ex-card-title input.title-edit {
  flex: 1; background: transparent; border: none;
  border-bottom: 2px solid var(--blue); color: var(--text);
  font-size: 1rem; font-weight: 700; font-family: inherit;
  outline: none; padding: 0 0 2px; min-width: 0;
}
.insert-set-btn {
  flex-shrink: 0; background: var(--green); color: #fff; border: none;
  border-radius: 7px; width: 30px; height: 30px;
  font-size: 1.2rem; font-weight: 700; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s; pointer-events: none;
}
.ex-card:hover .insert-set-btn,
.ex-card:focus-within .insert-set-btn { opacity: 1; pointer-events: auto; }
.ex-card-title.active-insert .insert-set-btn { opacity: 1; pointer-events: auto; }

/* Superset title colours */
.ex-card[data-superset="red"]    .ex-card-title { background:#ef4444; color:#fff; border-color:#ef4444; }
.ex-card[data-superset="orange"] .ex-card-title { background:#f97316; color:#fff; border-color:#f97316; }
.ex-card[data-superset="yellow"] .ex-card-title { background:#eab308; color:#1a1a1a; border-color:#eab308; }
.ex-card[data-superset="purple"] .ex-card-title { background:#9333ea; color:#fff; border-color:#9333ea; }
.ex-card[data-superset] .insert-set-btn { background:rgba(0,0,0,.25); }

/* ══ Rest Row ════════════════════════════════════════════ */
.ex-rest-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px;
  background: var(--surface2); border-bottom: 1px solid var(--border);
  font-size: .85rem; color: var(--text-muted);
}
.ex-rest-row label { font-weight: 600; white-space: nowrap; }
.rest-input {
  border: none; background: transparent;
  border-bottom: 1px solid var(--border); color: var(--text);
  font-size: .85rem; font-family: inherit;
  width: 52px; text-align: center; outline: none; padding: 1px 2px;
}
.rest-input::placeholder { color: var(--text-muted); }

/* ══ Notes Section ═══════════════════════════════════════ */
.notes-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; cursor: pointer;
  font-size: .82rem; font-weight: 600; color: var(--text-muted);
  border-top: 1px solid var(--border);
  user-select: none; -webkit-user-select: none;
}
.notes-toggle:active { opacity: .6; }
.notes-chevron {
  display: inline-block; transition: transform .2s;
  font-style: normal; font-size: .7rem;
}
.notes-chevron.open { transform: rotate(90deg); }
.notes-body { display: none; padding: 0 16px 12px; border-top: 1px solid var(--border); }
.notes-body.open { display: block; }
.notes-textarea {
  width: 100%; min-height: 90px;
  background: transparent; border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: inherit; font-size: .95rem;
  line-height: 1.5; padding: 10px 12px; outline: none;
  resize: vertical; margin-top: 10px;
}
.notes-textarea::placeholder { color: var(--text-muted); }

/* ══ Superset Swatches ═══════════════════════════════════ */
.superset-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px 4px; flex-wrap: wrap;
}
.timed-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 16px 12px;
}
.timed-row label {
  display: flex; align-items: center; gap: 7px;
  font-size: .82rem; font-weight: 700; color: var(--text-muted);
  letter-spacing: .4px; cursor: pointer; user-select: none;
}
.timed-row input[type="checkbox"] {
  width: 16px; height: 16px; cursor: pointer; accent-color: var(--blue);
}
.superset-label { font-size:.78rem; font-weight:700; color:var(--text-muted); letter-spacing:.4px; white-space:nowrap; }
.ss-swatches { display:flex; gap:8px; align-items:center; }
.ss-swatch {
  width:26px; height:26px; border-radius:6px; border:3px solid transparent;
  cursor:pointer; transition:transform .15s, border-color .15s; flex-shrink:0;
}
.ss-swatch:active { transform:scale(.88); }
.ss-swatch.selected { border-color:var(--text); transform:scale(1.1); }
.ss-swatch[data-color="red"]    { background:#ef4444; }
.ss-swatch[data-color="orange"] { background:#f97316; }
.ss-swatch[data-color="yellow"] { background:#eab308; }
.ss-swatch[data-color="purple"] { background:#9333ea; }

/* ══ Current-ex meta ════════════════════════════════════ */
#cur-meta {
  display:flex; align-items:center; gap:8px; padding:8px 16px;
  background:var(--surface2); border-bottom:1px solid var(--border);
  font-size:.85rem; color:var(--text-muted);
}
#cur-meta label { font-weight:600; white-space:nowrap; }
#cur-notes-toggle {
  display:flex; align-items:center; gap:8px; padding:10px 16px;
  cursor:pointer; font-size:.82rem; font-weight:600; color:var(--text-muted);
  border-bottom:1px solid var(--border);
  user-select:none; -webkit-user-select:none;
}
#cur-notes-toggle:active { opacity:.6; }
#cur-notes-body { display:none; padding:0 16px 12px; border-bottom:1px solid var(--border); }
#cur-notes-body.open { display:block; }
#current-ex[data-superset="red"]    #ex-title-input { border-left:5px solid #ef4444; }
#current-ex[data-superset="orange"] #ex-title-input { border-left:5px solid #f97316; }
#current-ex[data-superset="yellow"] #ex-title-input { border-left:5px solid #eab308; }
#current-ex[data-superset="purple"] #ex-title-input { border-left:5px solid #9333ea; }

/* ══ Sets Grid ═══════════════════════════════════════════ */
.sets-col-header, .set-row {
  display: grid; grid-template-columns: 20% 40% 40%;
}
.sets-col-header {
  padding: 7px 16px; font-size: .7rem; font-weight: 700;
  letter-spacing: .5px; text-transform: uppercase;
  color: var(--text-muted); border-bottom: 1px solid var(--border);
}
/* Set row swipe/delete */
.set-row-wrap {
  position: relative; overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.set-row-wrap:last-child { border-bottom: none; }
.set-row {
  border-bottom: none !important;
  transition: transform .2s cubic-bezier(.4,0,.2,1);
  background: var(--surface);
  align-items: center;
}
.set-num { padding:11px 16px; font-size:.85rem; font-weight:700; color:var(--text-muted); }
.set-input {
  border: none; background: transparent; color: var(--text);
  font-size: 1rem; padding: 11px 12px 11px 0; width: 100%; outline: none;
}
.set-input::placeholder { color: var(--text-muted); }
.set-del-btn {
  position: absolute; right: 0; top: 0; bottom: 0; width: 56px;
  background: var(--red); color: #fff; border: none;
  font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
  transform: translateX(100%);
  transition: transform .2s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}
@media (hover: hover) {
  .set-row-wrap:hover .set-del-btn { transform: translateX(0); }
}
.set-row-wrap.show-del .set-del-btn { transform: translateX(0); }
.set-row-wrap.show-del .set-row     { transform: translateX(-56px); }

/* ══ Current Exercise Card ═══════════════════════════════ */
#current-ex {
  background: var(--surface); border-radius: 14px;
  overflow: hidden; box-shadow: var(--shadow);
}
#ex-title-input {
  width: 100%; border: none; background: var(--surface2); color: var(--text);
  font-size: 1.05rem; font-weight: 700; padding: 14px 16px; outline: none;
  border-bottom: 1px solid var(--border);
}
#ex-title-input::placeholder { color: var(--text-muted); font-weight: 400; }
.action-row {
  display: grid; grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--border);
}
.action-btn {
  border: none; padding: 15px; font-size: 1.1rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: filter .15s;
}
.action-btn:active { filter: brightness(.85); }
#btn-next { background: var(--blue); color: #fff; border-right: 1px solid rgba(255,255,255,.15); }
#btn-add  { background: var(--green); color: #fff; }
#btn-done {
  width: 100%; border: none; padding: 14px;
  background: var(--green-dark); color: #fff;
  font-size: .95rem; font-weight: 700; letter-spacing: .5px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer; border-top: 1px solid rgba(255,255,255,.1);
  transition: filter .15s;
}
#btn-done:active { filter: brightness(.85); }

/* ══ Done Card ═══════════════════════════════════════════ */
#done-card {
  display: none; background: var(--surface); border-radius: 14px;
  overflow: hidden; box-shadow: var(--shadow);
  text-align: center; padding: 24px 20px;
  flex-direction: column; gap: 12px; align-items: center;
}
#done-card.show { display: flex; }
#done-card .done-check { font-size: 2.2rem; line-height: 1; }
#done-card p { color: var(--text-muted); font-size: .9rem; }
#done-card button {
  width: 100%; border: none; padding: 13px; border-radius: 10px;
  background: var(--blue); color: #fff; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: filter .15s;
}
#done-card button:active { filter: brightness(.85); }

/* ══ Reorder / Delete Mode ═══════════════════════════════ */
.mode-card {
  background: var(--surface); border-radius: 12px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow);
}
.mode-card-title { flex: 1; font-weight: 600; }
.arrow-btns { display: flex; flex-direction: column; gap: 3px; }
.arrow-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; width: 34px; height: 30px; font-size: .75rem;
  display: flex; align-items: center; justify-content: center; transition: opacity .15s;
}
.arrow-btn:disabled { opacity: .2; pointer-events: none; }
.arrow-btn:active { opacity: .5; }
.del-check { width: 24px; height: 24px; accent-color: var(--red); cursor: pointer; flex-shrink: 0; }
.mode-hint { text-align: center; padding: 10px; font-size: .85rem; color: var(--text-muted); }

/* ══ Confirm Bar ═════════════════════════════════════════ */
#confirm-bar {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  max-width: 600px; margin: 0 auto; background: var(--surface);
  border-top: 1px solid var(--border); padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  gap: 10px; z-index: 150; box-shadow: 0 -4px 16px rgba(0,0,0,.1);
}
#confirm-bar.show { display: flex; }
.cbar-btn {
  flex: 1; padding: 13px; border: none; border-radius: 10px;
  font-size: 1rem; font-weight: 700; transition: opacity .15s;
}
.cbar-btn:active { opacity: .7; }
#cbar-cancel  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
#cbar-confirm { background: var(--green); color: #fff; }
#cbar-confirm.is-delete { background: var(--red); }

/* ══ Settings ════════════════════════════════════════════ */
#settings-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 200; justify-content: flex-end;
}
#settings-overlay.open { display: flex; }
#settings-panel {
  background: var(--surface); width: min(88vw, 320px); height: 100%;
  overflow-y: auto; display: flex; flex-direction: column;
  animation: slideInRight .22s cubic-bezier(.4,0,.2,1); box-shadow: var(--shadow-lg);
}
@keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
.settings-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 20px 16px; font-weight: 700; font-size: 1.15rem;
  border-bottom: 1px solid var(--border);
}
.settings-close {
  background: var(--surface2); border: none; color: var(--text-muted);
  width: 30px; height: 30px; border-radius: 50%; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
}
.settings-close:active { opacity: .5; }
.settings-section {
  padding: 18px 20px; border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 10px;
}
/* Hide session management outside the session screen */
#session-manage-section { display: none; }
body[data-screen="session"] #session-manage-section { display: flex; }
.settings-section-label {
  font-size: .7rem; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px;
}
.toggle-row { display: flex; align-items: center; justify-content: space-between; font-weight: 500; }
.toggle { position: relative; width: 50px; height: 28px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track {
  position: absolute; inset: 0; background: #ccc; border-radius: 14px;
  cursor: pointer; transition: background .25s;
}
.toggle-track::after {
  content: ''; position: absolute; width: 22px; height: 22px;
  left: 3px; top: 3px; background: #fff; border-radius: 50%;
  transition: transform .25s; box-shadow: 0 1px 4px rgba(0,0,0,.25);
}
.toggle input:checked ~ .toggle-track { background: var(--blue); }
.toggle input:checked ~ .toggle-track::after { transform: translateX(22px); }
.s-btn {
  width: 100%; padding: 13px 16px; border-radius: 10px; border: none;
  font-size: .97rem; font-weight: 600; text-align: left;
  display: flex; align-items: center; gap: 10px; transition: opacity .15s;
}
.s-btn:active { opacity: .6; }

<script>
// ═══════════════════════════════════════════════════════════
//  IndexedDB
// ═══════════════════════════════════════════════════════════
const DB_NAME = 'lifted-db', DB_VER = 2;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('sessions')) {
        d.createObjectStore('sessions', { keyPath: 'id', autoIncrement: true })
         .createIndex('date', 'date');
      }
      if (!d.objectStoreNames.contains('settings')) {
        d.createObjectStore('settings', { keyPath: 'key' });
      }
      if (e.oldVersion < 2) {
        d.createObjectStore('library', { keyPath: 'name' });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}
function dbGetAll(store) {
  return new Promise((res, rej) => {
    const r = db.transaction(store,'readonly').objectStore(store).getAll();
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}
function dbPut(store, val) {
  return new Promise((res, rej) => {
    const r = db.transaction(store,'readwrite').objectStore(store).put(val);
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}
function dbDelete(store, key) {
  return new Promise((res, rej) => {
    const r = db.transaction(store,'readwrite').objectStore(store).delete(key);
    r.onsuccess = () => res();
    r.onerror   = () => rej(r.error);
  });
}
function dbGet(store, key) {
  return new Promise((res, rej) => {
    const r = db.transaction(store,'readonly').objectStore(store).get(key);
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}

// ═══════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════
let exercises       = [];
let currentSets     = [{ reps:'', weight:'' }];
let currentSuperset = null;
let currentTimed    = false;
let mode            = 'normal';
let isDark          = false;
let editMode        = true;
let modalCb         = null;
let importPending   = null;
let sessionPRs      = {};   // { 'bench press': { bestWeight:0, bestDuration:0 } }
let libraryCache    = [];   // cached array of { name, targetSets, targetReps } objects

// Active session metadata
let activeSession = { id: null, name: '', date: null, isFavorite: false, completed: false, hadPR: false };

// ═══════════════════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════════════════
async function init() {
  db = await openDB();
  await migrateLocalStorage();
  const settingsDark = await dbGet('settings', 'isDark');
  if (settingsDark) applyDark(settingsDark.value);
  await seedLibrary();
  libraryCache = await dbGetAll('library');
  goHistory();
}

async function migrateLocalStorage() {
  const raw = localStorage.getItem('lifted');
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    if (d.exercises && d.exercises.length > 0) {
      await dbPut('sessions', {
        name: 'Imported Workout', date: new Date().toISOString(),
        isFavorite: false, completed: true, exercises: d.exercises
      });
    }
    if (d.isDark !== undefined) await dbPut('settings', { key:'isDark', value: d.isDark });
    localStorage.removeItem('lifted');
  } catch(_) {}
}

async function computePRs(name) {
  const sessions = await dbGetAll('sessions');
  const nameLow = name.toLowerCase().trim();
  let bestWeight = 0, bestWeightDate = null;
  let bestDuration = 0, bestDurationDate = null;
  let totalSessions = 0;
  sessions.forEach(sess => {
    let found = false;
    (sess.exercises || []).forEach(ex => {
      if ((ex.title || '').toLowerCase().trim() !== nameLow) return;
      found = true;
      (ex.sets || []).forEach(s => {
        if (ex.timed) {
          const dur = parseFloat(s.reps) || 0;
          if (dur > bestDuration) { bestDuration = dur; bestDurationDate = sess.date; }
        } else {
          const w = parseFloat(s.weight) || 0;
          if (w > bestWeight) { bestWeight = w; bestWeightDate = sess.date; }
        }
      });
    });
    if (found) totalSessions++;
  });
  return { bestWeight, bestWeightDate, bestDuration, bestDurationDate, totalSessions };
}

async function getLastUsed(name) {
  const sessions = await dbGetAll('sessions');
  sessions.sort((a, b) => new Date(b.date) - new Date(a.date));
  const nameLow = name.toLowerCase().trim();
  for (const sess of sessions) {
    const ex = (sess.exercises || []).find(e => (e.title || '').toLowerCase().trim() === nameLow);
    if (!ex || !ex.sets || !ex.sets.length) continue;
    const dateStr = sess.date
      ? new Date(sess.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : '';
    if (ex.timed) {
      const best = Math.max(...ex.sets.map(s => parseFloat(s.reps) || 0));
      return best ? `Last: ${best} sec — ${dateStr}` : null;
    } else {
      const bestSet = ex.sets.reduce((b, s) => (parseFloat(s.weight) || 0) > (parseFloat(b.weight) || 0) ? s : b, ex.sets[0]);
      const parts = [];
      if (bestSet.weight) parts.push(bestSet.weight + ' lbs');
      if (bestSet.reps)   parts.push(bestSet.reps + ' reps');
      return parts.length ? `Last: ${parts.join(' × ')} — ${dateStr}` : null;
    }
  }
  return null;
}

async function renderExerciseDetail(name) {
  const el = document.getElementById('exercise-detail-main');
  el.innerHTML = '<p style="padding:20px;color:var(--text-muted)">Loading…</p>';
  const sessions = await dbGetAll('sessions');
  sessions.sort((a, b) => new Date(a.date) - new Date(b.date));
  const nameLow = name.toLowerCase().trim();
  const prs = await computePRs(name);

  // Collect per-session data points
  const dataPoints = [];
  sessions.forEach(sess => {
    const ex = (sess.exercises || []).find(e => (e.title || '').toLowerCase().trim() === nameLow);
    if (!ex || !ex.sets || !ex.sets.length) return;
    const dateStr = sess.date
      ? new Date(sess.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : '?';
    if (ex.timed) {
      const best = Math.max(...ex.sets.map(s => parseFloat(s.reps) || 0));
      const vol  = ex.sets.reduce((sum, s) => sum + (parseFloat(s.reps) || 0), 0);
      dataPoints.push({ x: dateStr, bestVal: best, volume: vol, timed: true });
    } else {
      const best = Math.max(...ex.sets.map(s => parseFloat(s.weight) || 0));
      const vol  = ex.sets.reduce((sum, s) => sum + (parseFloat(s.reps) || 0) * (parseFloat(s.weight) || 0), 0);
      dataPoints.push({ x: dateStr, bestVal: best, volume: vol, timed: false });
    }
  });

  const last16 = dataPoints.slice(-16);
  const isTimed = last16.length && last16[last16.length - 1].timed;
  const prDateFmt = d => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';

  el.innerHTML = `
    <div class="ex-detail-title">${esc(name)}</div>
    <p style="font-size:.8rem;color:var(--text-muted);margin-bottom:14px">${prs.totalSessions} session${prs.totalSessions!==1?'s':''}</p>
    <div class="pr-summary-box">
      <h4>Personal Records</h4>
      ${isTimed ? `
        <div class="pr-row">
          <span>Best Duration</span>
          <span><span class="pr-val">${prs.bestDuration ? prs.bestDuration + ' sec' : '—'}</span>
          <span class="pr-date"> ${prDateFmt(prs.bestDurationDate)}</span></span>
        </div>
      ` : `
        <div class="pr-row">
          <span>Best Weight</span>
          <span><span class="pr-val">${prs.bestWeight ? prs.bestWeight + ' lbs' : '—'}</span>
          <span class="pr-date"> ${prDateFmt(prs.bestWeightDate)}</span></span>
        </div>
      `}
    </div>
    <div class="chart-section">
      <h4>${isTimed ? 'Best Duration per Session (sec)' : 'Best Weight per Session (lbs)'}</h4>
      ${buildLineChart(last16.map(d => ({ x: d.x, y: d.bestVal })))}
    </div>
    <div class="chart-section">
      <h4>${isTimed ? 'Total Duration per Session (sec)' : 'Volume per Session (reps × lbs)'}</h4>
      ${buildBarChart(last16.map(d => ({ x: d.x, y: d.volume })))}
    </div>
  `;
}

function buildLineChart(pts) {
  if (!pts.length) return '<p class="chart-empty">No data yet</p>';
  const W=320, H=180, PL=44, PR=12, PT=14, PB=34;
  const plotW=W-PL-PR, plotH=H-PT-PB, n=pts.length;
  const vals=pts.map(d=>d.y);
  const minV=Math.min(...vals), maxV=Math.max(...vals);
  const range=maxV-minV||1;
  const toX=i=>PL+(n===1?plotW/2:i*plotW/(n-1));
  const toY=v=>PT+plotH-(v-minV)/range*plotH;
  let grid='', xlabels='', circles='';
  for (let g=0;g<=4;g++) {
    const y=PT+g*plotH/4, val=maxV-g*range/4;
    grid+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    grid+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="var(--text-muted)">${Math.round(val)}</text>`;
  }
  const showIdx=n<=5?pts.map((_,i)=>i):[0,Math.floor((n-1)/2),n-1];
  showIdx.forEach(i=>{
    xlabels+=`<text x="${toX(i)}" y="${H-4}" text-anchor="middle" font-size="9" fill="var(--text-muted)">${pts[i].x}</text>`;
  });
  circles=pts.map((d,i)=>`<circle cx="${toX(i)}" cy="${toY(d.y)}" r="4" fill="var(--blue)" stroke="var(--surface)" stroke-width="2"/>`).join('');
  const polyline=pts.map((d,i)=>`${toX(i)},${toY(d.y)}`).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">
    ${grid}
    <polyline points="${polyline}" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linejoin="round"/>
    ${circles}${xlabels}</svg>`;
}

function buildBarChart(pts) {
  if (!pts.length) return '<p class="chart-empty">No data yet</p>';
  const W=320, H=180, PL=44, PR=12, PT=14, PB=34;
  const plotW=W-PL-PR, plotH=H-PT-PB, n=pts.length;
  const maxV=Math.max(...pts.map(d=>d.y),1);
  const barW=Math.max(4,plotW/n-4);
  let grid='', bars='', xlabels='';
  for (let g=1;g<=4;g++) {
    const y=PT+plotH-g*plotH/4, val=maxV*g/4;
    grid+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    grid+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="var(--text-muted)">${Math.round(val)}</text>`;
  }
  pts.forEach((d,i)=>{
    const x=PL+i*plotW/n+(plotW/n-barW)/2;
    const bH=Math.max(2,(d.y/maxV)*plotH), y=PT+plotH-bH;
    bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${bH.toFixed(1)}" rx="3" fill="var(--blue)" opacity="0.85"/>`;
    if (n<=6||i===0||i===n-1) xlabels+=`<text x="${(x+barW/2).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="9" fill="var(--text-muted)">${d.x}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">
    ${grid}
    <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+plotH}" stroke="var(--border)" stroke-width="1"/>
    ${bars}${xlabels}</svg>`;
}

async function saveLibraryEntry(originalName) {
  const newName   = (document.getElementById('lib-name-'+ originalName)?.value || '').trim();
  const targetSets= parseInt(document.getElementById('lib-sets-'+ originalName)?.value) || null;
  const targetReps= (document.getElementById('lib-reps-'+ originalName)?.value || '').trim() || null;
  if (!newName) return;
  const entry = { name: newName, targetSets, targetReps };
  if (newName !== originalName) await dbDelete('library', originalName);
  await dbPut('library', entry);
  // Update cache
  const idx = libraryCache.findIndex(e => e.name === originalName);
  if (idx >= 0) libraryCache[idx] = entry;
  else libraryCache.push(entry);
  libraryCache.sort((a, b) => a.name.localeCompare(b.name));
  await renderLibrary();
}

  showModal('Delete Exercise?', `Remove "${name}" from the library?`, 'Delete', 'var(--red)', async () => {
    await dbDelete('library', name);
    libraryCache = libraryCache.filter(e => e.name !== name);
    await renderLibrary();
  });
}

  } else if (activeSession.id) {

  await renderHistory();

function openSessionScreen() {
  setScreen('session');
  document.getElementById('workout-name-input').value = activeSession.name;
  const dateEl = document.getElementById('session-date-text');
  dateEl.textContent = activeSession.date
    ? new Date(activeSession.date).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' })
    : 'New workout';
  const copyBtn = document.getElementById('open-copy-btn');
  copyBtn.classList.toggle('show', !!activeSession.id);
  // star
  const star = document.getElementById('hdr-star');
  star.textContent  = activeSession.isFavorite ? '★' : '☆';
  star.classList.toggle('active', activeSession.isFavorite);
  // edit mode
  applyEditMode();
  // hide done-card; if in edit mode show entry form
  document.getElementById('done-card').classList.remove('show');
  if (editMode) document.getElementById('current-ex').style.display = '';
  render();
  renderCurrentSets();
}

function onWorkoutNameChange() {
  activeSession.name = document.getElementById('workout-name-input').value;
  save();
}

// ═══════════════════════════════════════════════════════════
//  History rendering
// ═══════════════════════════════════════════════════════════
async function renderHistory() {
  const all = await dbGetAll('sessions');
  all.sort((a,b) => new Date(b.date) - new Date(a.date));
  const favs    = all.filter(s => s.isFavorite);
  const recents = all.filter(s => !s.isFavorite);

  const favEl  = document.getElementById('favorites-section');
  const recEl  = document.getElementById('history-section');

  favEl.innerHTML = '';
  recEl.innerHTML = '';

  if (favs.length) {
    favEl.innerHTML = '<div class="hist-section-label">⭐ Favorites</div>';
    favs.forEach(s => favEl.appendChild(buildSessCard(s)));
  }

  if (recents.length) {
    recEl.innerHTML = '<div class="hist-section-label">Recent</div>';
    recents.forEach(s => recEl.appendChild(buildSessCard(s)));
  }

  if (!all.length) {
    recEl.innerHTML = '<div class="hist-empty">No workouts yet.<br>Tap <strong>New Workout</strong> to get started.</div>';
  }
}

function buildSessCard(sess) {
  const wrap = document.createElement('div');
  wrap.className = 'sess-wrap';
  wrap.dataset.id = sess.id;
  const exCount = (sess.exercises || []).length;
  const dateStr = sess.date
    ? new Date(sess.date).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
    : '';
  const name = sess.name || '';
  wrap.innerHTML = `
    <div class="sess-row">
      <div class="sess-card-body" onclick="openSession(${sess.id})">
        <div class="sess-name ${name ? '' : 'untitled'}">${name ? esc(name) : 'Untitled Workout'}${sess.hadPR ? ' <span class="sess-pr-trophy" title="Personal Record set this session">🏆</span>' : ''}</div>
        <div class="sess-meta">${dateStr}${exCount ? ' &nbsp;·&nbsp; ' + exCount + ' exercise' + (exCount !== 1 ? 's':'') : ''}</div>
      </div>
      <button class="sess-star-btn ${sess.isFavorite ? 'active':''}"
              onclick="event.stopPropagation(); toggleFav(${sess.id}, this)"
              title="Favorite">${sess.isFavorite ? '★':'☆'}</button>
      <button class="sess-del-btn"
              onclick="event.stopPropagation(); deleteSession(${sess.id})"
              title="Delete">🗑</button>
    </div>
  `;
  return wrap;
}

async function toggleFav(id, btn) {
  const sess = await dbGet('sessions', id);
  if (!sess) return;
  sess.isFavorite = !sess.isFavorite;
  await dbPut('sessions', sess);
  // Update button in place
  if (btn) {
    btn.classList.toggle('active', sess.isFavorite);
    btn.textContent = sess.isFavorite ? '★' : '☆';
    // Move card between sections
    await renderHistory();
  }
}

async function deleteSession(id) {
  showModal('Delete Workout?', 'This workout will be permanently deleted.', 'Delete', 'var(--red)', async () => {
    await dbDelete('sessions', id);
    await renderHistory();
  });
}

// ═══════════════════════════════════════════════════════════
//  Session favorite toggle (header star)
// ═══════════════════════════════════════════════════════════
async function toggleSessionFavorite() {
  activeSession.isFavorite = !activeSession.isFavorite;
  await saveSession();
  const star = document.getElementById('hdr-star');
  star.textContent = activeSession.isFavorite ? '★' : '☆';
  star.classList.toggle('active', activeSession.isFavorite);
}

// ═══════════════════════════════════════════════════════════
//  Open As Copy
// ═══════════════════════════════════════════════════════════
function useAsTemplate() {
  const templateExercises = exercises.map(ex => ({
    ...ex, sets: [{ reps: '', weight: '' }]
  }));
  const now = new Date();
  const day = now.getDate();
  const suffix = day === 1 || day === 21 || day === 31 ? 'st'
               : day === 2 || day === 22 ? 'nd'
               : day === 3 || day === 23 ? 'rd' : 'th';
  const dateTitle = now.toLocaleDateString('en-US', { weekday:'long', month:'long', year:'numeric' })
    .replace(/(\w+)\s(\w+)\s(\d+)/, (_, wd, mo, yr) => `${wd}, ${mo} ${day}${suffix}, ${yr}`);
  activeSession = { id: null, name: dateTitle,
    date: null, isFavorite: false, completed: false, hadPR: false };
  exercises     = templateExercises;
  editMode      = true;
  sessionPRs    = {};
  resetCurrentEx();
  openSessionScreen();
}

// ═══════════════════════════════════════════════════════════
//  Render saved exercises (within session)
// ═══════════════════════════════════════════════════════════
function render() {
  const list = document.getElementById('ex-list');
  if (mode === 'reorder') { renderReorder(list); return; }
  if (mode === 'delete')  { renderDelete(list);  return; }
  if (!exercises.length)  { list.innerHTML = ''; return; }

  list.innerHTML = exercises.map((ex, ei) => `
    <div class="ex-card" ${ex.superset ? `data-superset="${ex.superset}"` : ''}>
      <div class="ex-card-title ${ex.title?'':'untitled'}" onclick="toggleInsertBtn(this)">
        <span class="title-text" onclick="event.stopPropagation();editExTitle(this,${ei})">${ex.title ? esc(ex.title) : 'Untitled Exercise'}</span>
        <button class="insert-set-btn" onclick="event.stopPropagation();insertSet(${ei})" title="Add set">+</button>
      </div>
      <div class="ex-rest-row">
        <label for="rest-${ei}">⏱ Rest:</label>
        <input id="rest-${ei}" class="rest-input" type="text" inputmode="decimal"
          value="${esc(ex.rest||'')}" placeholder="—" maxlength="6"
          onchange="syncSupersetRest(${ei}, this.value)">
        <span>sec</span>
      </div>
      <div class="sets-col-header"><span>Set</span><span>${ex.timed?'Duration':'Reps'}</span><span>Weight</span></div>
      ${ex.sets.map((s,si) => `
        <div class="set-row-wrap">
          <div class="set-row">
            <div class="set-num">${si+1}</div>
            <input class="set-input" type="text" inputmode="decimal"
              value="${esc(s.reps)}" placeholder="${ex.timed?'Duration':'—'}"
              onchange="updateSavedSet(${ei},${si},'reps',this.value)">
            <input class="set-input" type="text" inputmode="decimal"
              value="${esc(s.weight)}" placeholder="—"
              onchange="updateSavedSet(${ei},${si},'weight',this.value)">
          </div>
          <button class="set-del-btn" onclick="deleteSavedSet(${ei},${si})" title="Delete set">🗑</button>
        </div>
      `).join('')}
      <div class="notes-toggle" onclick="toggleNotes(this)">
        <i class="notes-chevron">▶</i><span>Notes</span>
      </div>
      <div class="notes-body">
        <textarea class="notes-textarea" placeholder="Notes…" rows="3"
          onchange="exercises[${ei}].notes=this.value;save()">${esc(ex.notes||'')}</textarea>
        <div class="timed-row">
          <label>
            <input type="checkbox" ${ex.timed?'checked':''} onchange="setSavedTimed(${ei},this.checked)">
            Timed exercise (duration instead of reps)
          </label>
        </div>
        <div class="superset-row">
          <span class="superset-label">Superset:</span>
          <div class="ss-swatches">
            ${['red','orange','yellow','purple'].map(c=>`
              <div class="ss-swatch ${ex.superset===c?'selected':''}" data-color="${c}"
                onclick="setSavedSuperset(${ei},'${c}')" title="${c}"></div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.ex-card').forEach(card => attachSwipeHandlers(card));
}

function updateSavedSet(ei, si, field, val) {
  exercises[ei].sets[si][field] = val;
  save();
  const ex = exercises[ei];
  if (ex.title) checkForPR(ex.title, !!ex.timed, ex.sets[si].weight, ex.sets[si].reps);
}

async function checkForPR(exName, isTimed, weight, reps) {
  if (!exName || activeSession.hadPR) return; // already flagged this session
  const key = exName.toLowerCase().trim();
  if (!sessionPRs[key]) sessionPRs[key] = await computePRs(exName);
  const pr = sessionPRs[key];
  let isPR = false;
  if (isTimed) {
    const dur = parseFloat(reps) || 0;
    if (dur > 0 && dur > pr.bestDuration) isPR = true;
  } else {
    const w = parseFloat(weight) || 0;
    if (w > 0 && w > pr.bestWeight) isPR = true;
  }
  if (isPR) {
    activeSession.hadPR = true;
    save();
  }
}

// Sync rest time across all exercises sharing the same superset color
function syncSupersetRest(ei, val) {
  exercises[ei].rest = val;
  const color = exercises[ei].superset;
  if (color) {
    exercises.forEach((ex, i) => {
      if (ex.superset === color) {
        ex.rest = val;
        const inp = document.getElementById('rest-' + i);
        if (inp) inp.value = val;
      }
    });
  }
  save();
}

// Sync rest from the current (unsaved) exercise entry to all saved exercises with the same superset color
function syncCurrentExRest(val) {
  if (!currentSuperset) return;
  exercises.forEach((ex, i) => {
    if (ex.superset === currentSuperset) {
      ex.rest = val;
      const inp = document.getElementById('rest-' + i);
      if (inp) inp.value = val;
    }
  });
  save();
}
function toggleInsertBtn(el) { el.classList.toggle('active-insert'); }
function toggleNotes(el) {
  el.querySelector('.notes-chevron').classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}
function toggleCurNotes() {
  document.getElementById('cur-notes-chevron').classList.toggle('open');
  document.getElementById('cur-notes-body').classList.toggle('open');
}

// ── Superset ────────────────────────────────────────────
function setCurTimed(checked) {
  currentTimed = checked;
  const hdr = document.getElementById('cur-reps-header');
  if (hdr) hdr.textContent = checked ? 'Duration' : 'Reps';
  renderCurrentSets();
}

function setSavedTimed(ei, checked) {
  exercises[ei].timed = checked;
  save();
  render();
}

function setCurSuperset(color) {
  currentSuperset = (currentSuperset === color) ? null : color;
  document.querySelectorAll('#cur-notes-body .ss-swatch').forEach(el =>
    el.classList.toggle('selected', el.dataset.color === currentSuperset));
  const ce = document.getElementById('current-ex');
  if (currentSuperset) ce.dataset.superset = currentSuperset; else delete ce.dataset.superset;
  // If a color was just selected, pull rest from matching saved exercises (if any) or push current rest to them
  if (currentSuperset) {
    const curRest = document.getElementById('cur-rest-input').value.trim();
    const matchRest = exercises.find(ex => ex.superset === currentSuperset && ex.rest)?.rest || '';
    if (matchRest && !curRest) {
      document.getElementById('cur-rest-input').value = matchRest;
    } else if (curRest) {
      syncCurrentExRest(curRest);
    }
  }
}

function setSavedSuperset(ei, color) {
  exercises[ei].superset = (exercises[ei].superset === color) ? null : color;
  // Sync rest when color selected
  if (exercises[ei].superset) {
    const matchRest = exercises.find((ex, i) => i !== ei && ex.superset === exercises[ei].superset && ex.rest)?.rest || '';
    if (matchRest && !exercises[ei].rest) {
      exercises[ei].rest = matchRest;
      const inp = document.getElementById('rest-' + ei);
      if (inp) inp.value = matchRest;
    } else if (exercises[ei].rest) {
      syncSupersetRest(ei, exercises[ei].rest);
    }
  }
  save();
  const card = document.querySelectorAll('.ex-card')[ei];
  if (!card) return;
  if (exercises[ei].superset) card.dataset.superset = exercises[ei].superset;
  else delete card.dataset.superset;
  card.querySelectorAll('.ss-swatch').forEach(el =>
    el.classList.toggle('selected', el.dataset.color === exercises[ei].superset));
}

// ── Edit title inline ───────────────────────────────────
function editExTitle(spanEl, ei) {
  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'title-edit';
  inp.value = exercises[ei].title || '';
  inp.maxLength = 200; inp.autocomplete = 'off'; inp.spellcheck = false;
  const commit = () => {
    const val = inp.value.trim();
    exercises[ei].title = val; save();
    const sp = document.createElement('span');
    sp.className = 'title-text';
    sp.onclick = e => { e.stopPropagation(); editExTitle(sp, ei); };
    sp.textContent = val || 'Untitled Exercise';
    inp.closest('.ex-card-title').classList.toggle('untitled', !val);
    inp.replaceWith(sp);
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); inp.blur(); } });
  spanEl.replaceWith(inp); inp.focus(); inp.select();
}

// ── Insert set into saved exercise ──────────────────────
function insertSet(ei) {
  const sets = exercises[ei].sets;
  const prev = sets[sets.length-1];
  sets.push({ reps: prev?.reps||'', weight: prev?.weight||'' });
  save(); render();
  setTimeout(() => {
    const card = document.querySelectorAll('.ex-card')[ei];
    if (!card) return;
    const rows = card.querySelectorAll('.set-row');
    rows[rows.length-1]?.scrollIntoView({ behavior:'smooth', block:'nearest' });
    rows[rows.length-1]?.querySelector('.set-input')?.focus();
    card.querySelector('.ex-card-title')?.classList.add('active-insert');
  }, 60);
}

// ═══════════════════════════════════════════════════════════
//  Reorder / Delete modes
// ═══════════════════════════════════════════════════════════
function renderReorder(list) {
  if (!exercises.length) { list.innerHTML = '<p class="mode-hint">No exercises to reorder.</p>'; return; }
  list.innerHTML = exercises.map((ex,i) => `
    <div class="mode-card">
      <span class="mode-card-title">${ex.title ? esc(ex.title) : '<em style="opacity:.5">Untitled</em>'}</span>
      <div class="arrow-btns">
        <button class="arrow-btn" onclick="moveEx(${i},-1)" ${i===0?'disabled':''}>▲</button>
        <button class="arrow-btn" onclick="moveEx(${i}, 1)" ${i===exercises.length-1?'disabled':''}>▼</button>
      </div>
    </div>`).join('');
}
function moveEx(i,dir) {
  const j=i+dir; if(j<0||j>=exercises.length) return;
  [exercises[i],exercises[j]]=[exercises[j],exercises[i]];
  renderReorder(document.getElementById('ex-list'));
}

function renderDelete(list) {
  if (!exercises.length) { list.innerHTML = '<p class="mode-hint">No exercises to delete.</p>'; return; }
  list.innerHTML = exercises.map((ex,i) => `
    <div class="mode-card">
      <input class="del-check" type="checkbox" id="dc${i}" onchange="refreshDeleteBtn()">
      <label for="dc${i}" class="mode-card-title" style="cursor:pointer">
        ${ex.title ? esc(ex.title) : '<em style="opacity:.5">Untitled</em>'}
      </label>
    </div>`).join('');
}
function refreshDeleteBtn() {
  const n = document.querySelectorAll('.del-check:checked').length;
  document.getElementById('cbar-confirm').textContent = n>0 ? `🗑  Delete (${n})` : '🗑  Delete Selected';
}
function startReorder() {
  closeSettings(); mode='reorder';
  document.getElementById('current-ex').style.display='none';
  render();
  const btn=document.getElementById('cbar-confirm');
  btn.textContent='Confirm Order'; btn.classList.remove('is-delete');
  document.getElementById('confirm-bar').classList.add('show');
}
function startDelete() {
  closeSettings(); mode='delete';
  document.getElementById('current-ex').style.display='none';
  render();
  const btn=document.getElementById('cbar-confirm');
  btn.textContent='🗑  Delete Selected'; btn.classList.add('is-delete');
  document.getElementById('confirm-bar').classList.add('show');
}
function cancelMode() {
  mode='normal';
  document.getElementById('confirm-bar').classList.remove('show');
  document.getElementById('current-ex').style.display='';
  render();
}
function confirmMode() {
  if (mode==='reorder') { save(); cancelMode(); }
  else if (mode==='delete') {
    const checked=[...document.querySelectorAll('.del-check:checked')];
    if (!checked.length) { cancelMode(); return; }
    const toRm=new Set(checked.map(cb=>parseInt(cb.id.replace('dc',''))));
    exercises=exercises.filter((_,i)=>!toRm.has(i));
    save(); cancelMode();
  }
}

// ═══════════════════════════════════════════════════════════
//  Current Sets
// ═══════════════════════════════════════════════════════════
function flushCurrentInputs() {
  document.querySelectorAll('#current-sets .set-row').forEach((row,i) => {
    const [rIn,wIn]=row.querySelectorAll('.set-input');
    if (currentSets[i]) { currentSets[i].reps=rIn?rIn.value:''; currentSets[i].weight=wIn?wIn.value:''; }
  });
}
function renderCurrentSets() {
  const c=document.getElementById('current-sets');
  const repLabel = currentTimed ? 'Duration' : 'Reps';
  c.innerHTML=currentSets.map((s,i)=>`
    <div class="set-row-wrap">
      <div class="set-row">
        <div class="set-num">${i+1}</div>
        <input class="set-input" type="text" inputmode="decimal" value="${esc(s.reps)}" placeholder="${repLabel}"
               onchange="checkCurrentSetPR()">
        <input class="set-input" type="text" inputmode="decimal" value="${esc(s.weight)}" placeholder="lbs"
               onchange="checkCurrentSetPR()">
      </div>
      <button class="set-del-btn" onclick="deleteCurrentSet(${i})" title="Delete set">🗑</button>
    </div>`).join('');
  attachSwipeHandlers(c);
}

function checkCurrentSetPR() {
  flushCurrentInputs();
  const title = document.getElementById('ex-title-input').value.trim();
  if (!title) return;
  currentSets.forEach(s => {
    checkForPR(title, currentTimed, s.weight, s.reps);
  });
}
function deleteCurrentSet(i) {
  if (currentSets.length===1) return;
  flushCurrentInputs(); currentSets.splice(i,1); renderCurrentSets();
}
function deleteSavedSet(ei,si) {
  if (exercises[ei].sets.length===1) return;
  exercises[ei].sets.splice(si,1); save(); render();
}
function addSet() {
  flushCurrentInputs();
  const prev=currentSets[currentSets.length-1];
  currentSets.push({ reps:prev?.reps||'', weight:prev?.weight||'' });
  renderCurrentSets();
  setTimeout(()=>{
    const rows=document.querySelectorAll('#current-sets .set-row');
    rows[rows.length-1]?.scrollIntoView({behavior:'smooth',block:'nearest'});
    rows[rows.length-1]?.querySelector('.set-input')?.focus();
  },60);
}

// ═══════════════════════════════════════════════════════════
//  Next Exercise / Done / Resume
// ═══════════════════════════════════════════════════════════
function nextExercise() {
  flushCurrentInputs();
  const title=document.getElementById('ex-title-input').value.trim();
  const rest=document.getElementById('cur-rest-input').value.trim();
  const notes=document.getElementById('cur-notes-input').value.trim();
  const hasSets=currentSets.some(s=>s.reps||s.weight);
  if (!title&&!hasSets) return;
  exercises.push({ title,rest,notes,superset:currentSuperset,timed:currentTimed,sets:currentSets.map(s=>({...s})) });
  save();
  resetCurrentEx(); render(); renderCurrentSets();
  setTimeout(()=>{
    document.getElementById('current-ex').scrollIntoView({behavior:'smooth',block:'start'});
    document.getElementById('ex-title-input').focus();
  },60);
}

async function doneWorkout() {
  flushCurrentInputs();
  const title=document.getElementById('ex-title-input').value.trim();
  const rest=document.getElementById('cur-rest-input').value.trim();
  const notes=document.getElementById('cur-notes-input').value.trim();
  const hasSets=currentSets.some(s=>s.reps||s.weight);
  if (title||hasSets) { exercises.push({ title,rest,notes,superset:currentSuperset,timed:currentTimed,sets:currentSets.map(s=>({...s})) }); }
  activeSession.completed=true;
  await saveSession();
  resetCurrentEx();
  editMode = false;
  applyEditMode();
  render();
  document.getElementById('done-card').classList.add('show');
}

function resumeWorkout() {
  editMode = true;
  applyEditMode();
  resetCurrentEx();
  document.getElementById('done-card').classList.remove('show');
  renderCurrentSets();
  setTimeout(()=>{
    document.getElementById('current-ex').scrollIntoView({behavior:'smooth',block:'start'});
    document.getElementById('ex-title-input').focus();
  },60);
}

// ═══════════════════════════════════════════════════════════
//  Exercise Library — Autocomplete + Last-Used Hint
// ═══════════════════════════════════════════════════════════
let _acBlurTimer = null;
let _pendingNewName = '';

function onTitleInput() {
  const val = document.getElementById('ex-title-input').value.trim();
  dismissSavePrompt();
  document.getElementById('ex-last-used-hint').style.display = 'none';
  document.getElementById('ex-target-hint').style.display = 'none';
  if (!val) { hideAutocomplete(); return; }
  const matches = libraryCache.filter(e => e.name.toLowerCase().includes(val.toLowerCase())).slice(0, 6);
  if (matches.length) showAutocomplete(matches.map(e => e.name));
  else hideAutocomplete();
}

function onTitleFocus() {
  const val = document.getElementById('ex-title-input').value.trim();
  if (val) onTitleInput();
}

function onTitleBlur() {
  _acBlurTimer = setTimeout(async () => {
    hideAutocomplete();
    const val = document.getElementById('ex-title-input').value.trim();
    if (!val) return;
    const entry = libraryCache.find(e => e.name.toLowerCase() === val.toLowerCase());
    if (!entry) {
      _pendingNewName = val;
      const prompt = document.getElementById('ex-save-prompt');
      document.getElementById('ex-save-prompt-text').textContent = `"${val}" is new. Save to library?`;
      prompt.style.display = 'flex';
    } else {
      const hint = await getLastUsed(val);
      const el = document.getElementById('ex-last-used-hint');
      if (hint) { el.textContent = hint; el.style.display = 'block'; }
      showTargetHint(entry);
    }
  }, 180);
}

function showAutocomplete(names) {
  const el = document.getElementById('ex-autocomplete');
  el.innerHTML = names.map(n => `<div class="ac-item" onmousedown="selectAutoComplete('${esc(n)}')">${esc(n)}</div>`).join('');
  el.style.display = 'block';
}

function hideAutocomplete() {
  document.getElementById('ex-autocomplete').style.display = 'none';
}

async function selectAutoComplete(name) {
  clearTimeout(_acBlurTimer);
  document.getElementById('ex-title-input').value = name;
  hideAutocomplete();
  dismissSavePrompt();
  const hint = await getLastUsed(name);
  const el = document.getElementById('ex-last-used-hint');
  if (hint) { el.textContent = hint; el.style.display = 'block'; }
  else el.style.display = 'none';
  const entry = libraryCache.find(e => e.name.toLowerCase() === name.toLowerCase());
  showTargetHint(entry);
}

function showTargetHint(entry) {
  const el = document.getElementById('ex-target-hint');
  if (entry && (entry.targetSets || entry.targetReps)) {
    const parts = [];
    if (entry.targetSets) parts.push(entry.targetSets + ' sets');
    if (entry.targetReps) parts.push(entry.targetReps + ' reps');
    el.textContent = 'Target: ' + parts.join(' × ');
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

async function saveExToLibrary() {
  if (!_pendingNewName) return;
  await dbPut('library', { name: _pendingNewName });
  libraryCache.push({ name: _pendingNewName });
  libraryCache.sort((a, b) => a.name.localeCompare(b.name));
  _pendingNewName = '';
  dismissSavePrompt();
}

function dismissSavePrompt() {
  _pendingNewName = '';
  document.getElementById('ex-save-prompt').style.display = 'none';
}

function resetCurrentEx() {
  document.getElementById('ex-title-input').value='';
  hideAutocomplete();
  document.getElementById('ex-last-used-hint').style.display='none';
  document.getElementById('ex-target-hint').style.display='none';
  dismissSavePrompt();
  document.getElementById('cur-rest-input').value='';
  document.getElementById('cur-notes-input').value='';
  document.getElementById('cur-notes-body').classList.remove('open');
  document.getElementById('cur-notes-chevron').classList.remove('open');
  const timedBox = document.getElementById('cur-timed-input');
  if (timedBox) timedBox.checked = false;
  currentTimed    = false;
  currentSuperset = null;
  delete document.getElementById('current-ex').dataset.superset;
  document.querySelectorAll('#cur-notes-body .ss-swatch').forEach(el=>el.classList.remove('selected'));
  const hdr = document.getElementById('cur-reps-header');
  if (hdr) hdr.textContent = 'Reps';
  currentSets=[{reps:'',weight:''}];
}

// ═══════════════════════════════════════════════════════════
//  Clear Session

function promptClearSession() {
  closeSettings();
  showModal('Clear Session?','This removes all exercises from the current session. History is unchanged.','Clear','var(--red)',()=>{
    exercises=[]; resetCurrentEx(); render(); renderCurrentSets();

  });

// ═══════════════════════════════════════════════════════════
//  Swipe-to-delete (set rows)
// ═══════════════════════════════════════════════════════════
function attachSwipeHandlers(container) {
  container.querySelectorAll('.set-row-wrap').forEach(wrap => {
    let startX=0,startY=0,tracking=false;
    wrap.addEventListener('touchstart',e=>{ startX=e.touches[0].clientX; startY=e.touches[0].clientY; tracking=false; },{passive:true});
    wrap.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
      if (!tracking) { if (Math.abs(dx)<Math.abs(dy)||Math.abs(dx)<6) return; tracking=true; }
      if (dx<0) {
        e.preventDefault();
        const row=wrap.querySelector('.set-row'), btn=wrap.querySelector('.set-del-btn');
        row.style.transition='none'; row.style.transform=`translateX(${Math.max(dx,-56)}px)`;
        btn.style.transition='none'; btn.style.transform=`translateX(${Math.max(100+(dx/56)*100,0)}%)`;
      }
    },{passive:false});
    wrap.addEventListener('touchend',e=>{
      if (!tracking) return;
      const dx=e.changedTouches[0].clientX-startX;
      const row=wrap.querySelector('.set-row'), btn=wrap.querySelector('.set-del-btn');
      row.style.transition=''; btn.style.transition=''; row.style.transform=''; btn.style.transform='';
      wrap.classList.toggle('show-del',dx<-40);
    });
  });
  document.addEventListener('touchstart',e=>{
    if (!e.target.closest('.set-row-wrap'))
      document.querySelectorAll('.set-row-wrap.show-del').forEach(w=>w.classList.remove('show-del'));
  },{passive:true});
}

//  Settings
// ═══════════════════════════════════════════════════════════
function openSettings() { document.getElementById('settings-overlay').classList.add('open'); }

// ═══════════════════════════════════════════════════════════
//  Export — multi-format modal
// ═══════════════════════════════════════════════════════════
function openExportModal() {
  closeSettings();
  flushCurrentInputs();
  const title=document.getElementById('ex-title-input').value.trim();
  const rest=document.getElementById('cur-rest-input').value.trim();
  const notes=document.getElementById('cur-notes-input').value.trim();
  const hasCur=currentSets.some(s=>s.reps||s.weight)||title;
  const all=[...exercises];
  if (hasCur) all.push({title:title||'Untitled',rest,notes,superset:currentSuperset,sets:currentSets});

  document.getElementById('modal-title').textContent='Export Workout';
  document.getElementById('modal-body').textContent=`${all.length} exercise${all.length!==1?'s':''} ready to export. Choose format:`;
  document.getElementById('modal-btns').innerHTML=`
    <button class="export-btn" onclick="runExport('json')">JSON</button>
    <button class="export-btn" onclick="runExport('md')">Markdown</button>
    <button class="export-btn" onclick="runExport('csv')">CSV</button>
    <button onclick="closeModal()" style="width:100%;padding:13px;border:1px solid var(--border);border-radius:10px;font-size:1rem;font-weight:700;background:var(--surface2);color:var(--text);cursor:pointer">Cancel</button>
  `;
  document.getElementById('modal-btns').style.flexDirection='column';
  document.getElementById('modal-overlay').classList.add('open');
}

function runExport(fmt) {
  closeModal();
  flushCurrentInputs();
  const title=document.getElementById('ex-title-input').value.trim();
  const rest=document.getElementById('cur-rest-input').value.trim();
  const notes=document.getElementById('cur-notes-input').value.trim();
  const hasCur=currentSets.some(s=>s.reps||s.weight)||title;
  const all=[...exercises];
  if (hasCur) all.push({title:title||'Untitled',rest,notes,superset:currentSuperset,sets:currentSets});

  const wName=activeSession.name||'Workout';
  const dateSlug=new Date().toISOString().slice(0,10);
  let content='', mime='text/plain', ext='txt';

  if (fmt==='json') {
    content=JSON.stringify({ name:activeSession.name, date:activeSession.date||new Date().toISOString(), exercises:all }, null, 2);
    mime='application/json'; ext='json';
  } else if (fmt==='md') {
    const date=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    content=`# ${wName} — ${date}\n\n`;
    if (!all.length) { content+='_No exercises logged._\n'; }
    else all.forEach(ex=>{
      content+=`## ${ex.title||'Untitled Exercise'}\n\n`;
      if (ex.rest)     content+=`**Rest:** ${ex.rest} sec\n\n`;
      if (ex.notes)    content+=`**Notes:** ${ex.notes}\n\n`;
      if (ex.superset) content+=`**Superset:** ${ex.superset}\n\n`;
      content+=`| Set | Reps | Weight |\n|:---:|:----:|:------:|\n`;
      ex.sets.forEach((s,i)=>{ content+=`| ${i+1} | ${s.reps||'—'} | ${s.weight||'—'} |\n`; });
      content+='\n';
    });
    mime='text/markdown'; ext='md';
  } else if (fmt==='csv') {
    content='Date,Workout,Exercise,Superset,Rest (sec),Set,Reps,Weight,Notes\n';
    const d=new Date().toLocaleDateString('en-US');
    all.forEach(ex=>{
      ex.sets.forEach((s,i)=>{
        const cols=[d,wName,ex.title||'',ex.superset||'',ex.rest||'',i+1,s.reps||'',s.weight||'',i===0?(ex.notes||''):''];
        content+=cols.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')+'\n';
      });
    });
    mime='text/csv'; ext='csv';
  }

  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`${dateSlug}-${wName.replace(/\s+/g,'-').toLowerCase()}.${ext}`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════
//  Import Markdown
// ═══════════════════════════════════════════════════════════
function triggerImport() {
  closeSettings();
  const inp=document.getElementById('import-file'); inp.value=''; inp.click();
}
function handleImport(input) {
  const file=input.files[0]; if (!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const parsed=parseMd(e.target.result);
    if (!parsed.length) { showModal('Nothing Found','No exercises could be read from that file.','OK','var(--blue)',()=>{}); return; }
    const hasExisting=exercises.length>0||document.getElementById('ex-title-input').value.trim()||currentSets.some(s=>s.reps||s.weight);
    if (hasExisting) showImportChoiceModal(parsed);
    else loadImport(parsed,false);
  };
  reader.readAsText(file);
}
function parseMd(text) {
  const result=[]; let current=null;
  for (const raw of text.split('\n')) {
    const line=raw.trim();
    if (line.startsWith('## ')) {
      if (current) result.push(current);
      current={title:line.slice(3).trim().replace(/<[^>]*>/g,'').slice(0,200),rest:'',notes:'',superset:null,sets:[]};
      continue;
    }
    if (!current) continue;
    const restM=line.match(/^\*\*Rest:\*\*\s*(\S+)/i);
    if (restM) { current.rest=restM[1].replace(/[^0-9.]/g,'').slice(0,6); continue; }
    const notesM=line.match(/^\*\*Notes:\*\*\s*(.*)/i);
    if (notesM) { current.notes=notesM[1].replace(/<[^>]*>/g,'').slice(0,1000); continue; }
    const ssM=line.match(/^\*\*Superset:\*\*\s*(\w+)/i);
    if (ssM) { const c=ssM[1].toLowerCase(); if(['red','orange','yellow','purple'].includes(c)) current.superset=c; continue; }
    if (line.startsWith('|')) {
      const cells=line.split('|').map(c=>c.trim()).filter((_,i,a)=>i>0&&i<a.length-1);
      if (cells.length<3) continue;
      const setNum=cells[0];
      if (/^[:\-]+$/.test(setNum)||setNum.toLowerCase()==='set') continue;
      if (!/^\d+$/.test(setNum)) continue;
      current.sets.push({
        reps:   cells[1]==='—'?'':cells[1].replace(/<[^>]*>/g,'').slice(0,20),
        weight: cells[2]==='—'?'':cells[2].replace(/<[^>]*>/g,'').slice(0,20)
      });
    }
  }
  if (current) result.push(current);
  return result.filter(ex=>ex.sets.length>0);
}
function loadImport(parsed,append) {
  flushCurrentInputs();
  if (append) {
    const t=document.getElementById('ex-title-input').value.trim();
    if (t||currentSets.some(s=>s.reps||s.weight)) exercises.push({title:t||'Untitled',sets:currentSets.map(s=>({...s}))});
    exercises=[...exercises,...parsed];
  } else {
    exercises=parsed;
    document.getElementById('ex-title-input').value='';
    currentSets=[{reps:'',weight:''}]; renderCurrentSets();
  }
  save(); render();
}
function showImportChoiceModal(parsed) {
  const count=parsed.length;
  document.getElementById('modal-title').textContent=`Import ${count} Exercise${count!==1?'s':''}?`;
  document.getElementById('modal-body').textContent='You already have a workout in progress. Replace it or append?';
  document.getElementById('modal-btns').innerHTML=`
    <button id="modal-cancel" onclick="closeModal()" style="background:var(--surface2);color:var(--text);border:1px solid var(--border)">Cancel</button>
    <button onclick="closeModal();loadImport(importPending,true)"  style="background:var(--blue);color:#fff;font-weight:700;flex:1;padding:12px;border:none;border-radius:10px">Append</button>
    <button onclick="closeModal();loadImport(importPending,false)" style="background:var(--red);color:#fff;font-weight:700;flex:1;padding:12px;border:none;border-radius:10px">Replace</button>
  `;
  importPending=parsed;
  document.getElementById('modal-overlay').classList.add('open');
}

// ═══════════════════════════════════════════════════════════
//  Modal helpers
// ═══════════════════════════════════════════════════════════
function showModal(title,body,confirmLabel,confirmColor,cb) {
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').textContent=body;
  document.getElementById('modal-btns').innerHTML=`
    <button id="modal-cancel" onclick="closeModal()" style="background:var(--surface2);color:var(--text);border:1px solid var(--border)">Cancel</button>
    <button id="modal-confirm" onclick="runModalConfirm()" style="background:${confirmColor};color:#fff">${confirmLabel}</button>
  `;
  modalCb=cb;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-btns').style.flexDirection = '';
  modalCb = null;
}
function runModalConfirm() { if(modalCb) modalCb(); closeModal(); }
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if (e.target===document.getElementById('modal-overlay')) closeModal();
});

// ═══════════════════════════════════════════════════════════
//  Utils
// ═══════════════════════════════════════════════════════════
function esc(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Boot ────
init();
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js'));
}
