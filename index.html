<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LIFTED</title>
  <style>
    /* ── Theme Variables ── */
    :root {
      --bg:           #f2f2f7;
      --surface:      #ffffff;
      --surface2:     #f2f2f7;
      --border:       #e0e0e5;
      --text:         #1a1a1a;
      --text-muted:   #8e8e93;
      --blue:         #2563eb;
      --green:        #16a34a;
      --red:          #dc2626;
      --header-bg:    #ffffff;
      --header-text:  #111111;
      --shadow:       0 1px 4px rgba(0,0,0,0.10), 0 2px 10px rgba(0,0,0,0.06);
      --shadow-lg:    0 4px 24px rgba(0,0,0,0.14);
    }
    [data-theme="dark"] {
      --bg:           #000000;
      --surface:      #1c1c1e;
      --surface2:     #2c2c2e;
      --border:       #3a3a3c;
      --text:         #f5f5f7;
      --text-muted:   #8e8e93;
      --header-bg:    #0a0a0a;
      --header-text:  #ffffff;
      --shadow:       0 1px 4px rgba(0,0,0,0.4), 0 2px 10px rgba(0,0,0,0.3);
      --shadow-lg:    0 4px 24px rgba(0,0,0,0.5);
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      max-width: 600px;
      margin: 0 auto;
      -webkit-tap-highlight-color: transparent;
    }

    button { font-family: inherit; cursor: pointer; }
    input  { font-family: inherit; }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      color: var(--header-text);
      padding: 14px 20px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.06);
      text-align: center;
    }

    #app-title {
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: 5px;
      color: var(--header-text);
    }

    #settings-btn {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--header-text);
      padding: 6px;
      line-height: 1;
      opacity: 0.85;
      transition: opacity .15s;
    }
    #settings-btn:active { opacity: 0.5; }
    #settings-btn svg { display: block; width: 26px; height: 26px; }

    /* ── Settings Overlay ── */
    #settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      justify-content: flex-end;
    }
    #settings-overlay.open { display: flex; }

    #settings-panel {
      background: var(--surface);
      width: min(88vw, 320px);
      height: 100%;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      animation: slideInRight 0.22s cubic-bezier(0.4,0,0.2,1);
      box-shadow: var(--shadow-lg);
    }
    @keyframes slideInRight {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 16px;
      font-weight: 700;
      font-size: 1.15rem;
      border-bottom: 1px solid var(--border);
    }
    .settings-close {
      background: var(--surface2);
      border: none;
      color: var(--text-muted);
      width: 30px; height: 30px;
      border-radius: 50%;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .settings-close:active { opacity: 0.5; }

    .settings-section {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .settings-section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 500;
    }
    .toggle {
      position: relative;
      width: 50px; height: 28px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 14px;
      cursor: pointer;
      transition: background .25s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      width: 22px; height: 22px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .25s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }
    .toggle input:checked ~ .toggle-track { background: var(--blue); }
    .toggle input:checked ~ .toggle-track::after { transform: translateX(22px); }

    /* Settings Buttons */
    .s-btn {
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      border: none;
      font-size: 0.97rem;
      font-weight: 600;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: opacity .15s;
    }
    .s-btn:active { opacity: 0.6; }
    .s-btn-outline {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .s-btn-blue  { background: var(--blue);  color: #fff; }
    .s-btn-red   { background: var(--red);   color: #fff; }

    /* ── Main Content ── */
    #main {
      padding: 14px 14px 120px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Exercise Card (saved) ── */
    .ex-card {
      background: var(--surface);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .ex-card-title {
      padding: 13px 16px;
      font-weight: 700;
      font-size: 1rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }
    .ex-card-title.untitled { color: var(--text-muted); font-weight: 400; font-style: italic; }
    .ex-card-title span.title-text {
      flex: 1;
      cursor: text;
    }
    .ex-card-title input.title-edit {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--blue);
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      outline: none;
      padding: 0 0 2px;
      min-width: 0;
    }
    .insert-set-btn {
      flex-shrink: 0;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 7px;
      width: 30px; height: 30px;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
    }
    .ex-card:hover  .insert-set-btn,
    .ex-card:focus-within .insert-set-btn { opacity: 1; pointer-events: auto; }
    .ex-card-title.active-insert .insert-set-btn { opacity: 1; pointer-events: auto; }

    /* ── Sets Grid ── */
    .sets-col-header, .set-row {
      display: grid;
      grid-template-columns: 20% 40% 40%;
    }
    .sets-col-header {
      padding: 7px 16px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    .set-row {
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .set-row:last-child { border-bottom: none; }

    .set-num {
      padding: 11px 16px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
    }
    .set-input {
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 1rem;
      padding: 11px 12px 11px 0;
      width: 100%;
      outline: none;
    }
    .set-input::placeholder { color: var(--text-muted); }

    /* ── Current Exercise ── */
    #current-ex {
      background: var(--surface);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    #ex-title-input {
      width: 100%;
      border: none;
      background: var(--surface2);
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 700;
      padding: 14px 16px;
      outline: none;
      border-bottom: 1px solid var(--border);
    }
    #ex-title-input::placeholder { color: var(--text-muted); font-weight: 400; }

    /* ── Action Buttons ── */
    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--border);
    }
    .action-btn {
      border: none;
      padding: 15px;
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: filter .15s;
    }
    .action-btn:active { filter: brightness(0.85); }
    #btn-next {
      background: var(--blue);
      color: #fff;
      border-right: 1px solid rgba(255,255,255,0.15);
    }
    #btn-add {
      background: var(--green);
      color: #fff;
    }
    .btn-icon { font-size: 1.3rem; line-height: 1; }

    /* ── Reorder / Delete Mode Cards ── */
    .mode-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
    }
    .mode-card-title { flex: 1; font-weight: 600; }
    .arrow-btns { display: flex; flex-direction: column; gap: 3px; }
    .arrow-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      width: 34px; height: 30px;
      font-size: 0.75rem;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s;
    }
    .arrow-btn:disabled { opacity: 0.2; pointer-events: none; }
    .arrow-btn:active { opacity: 0.5; }
    .del-check {
      width: 24px; height: 24px;
      accent-color: var(--red);
      cursor: pointer;
      flex-shrink: 0;
    }
    .mode-hint {
      text-align: center;
      padding: 10px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* ── Confirm Bar ── */
    #confirm-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      max-width: 600px;
      margin: 0 auto;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      gap: 10px;
      z-index: 150;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.1);
    }
    #confirm-bar.show { display: flex; }
    .cbar-btn {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      transition: opacity .15s;
    }
    .cbar-btn:active { opacity: 0.7; }
    #cbar-cancel { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    #cbar-confirm { background: var(--green); color: #fff; }
    #cbar-confirm.is-delete { background: var(--red); }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 400;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border-radius: 16px;
      padding: 26px 22px 20px;
      width: 100%;
      max-width: 320px;
      box-shadow: var(--shadow-lg);
    }
    .modal-box h3 { font-size: 1.1rem; margin-bottom: 10px; }
    .modal-box p  { color: var(--text-muted); line-height: 1.55; margin-bottom: 22px; font-size: 0.95rem; }
    .modal-btns   { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      transition: opacity .15s;
    }
    .modal-btns button:active { opacity: 0.7; }
    #modal-cancel  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    #modal-confirm { color: #fff; }
  </style>
</head>
<body>

<!-- ══ Settings Overlay ══════════════════════════════════════════ -->
<div id="settings-overlay">
  <div id="settings-panel">
    <div class="settings-header">
      <span>Settings</span>
      <button class="settings-close" onclick="closeSettings()">✕</button>
    </div>

    <!-- Appearance -->
    <div class="settings-section">
      <div class="settings-section-label">Appearance</div>
      <div class="toggle-row">
        <span>Dark Mode</span>
        <label class="toggle">
          <input type="checkbox" id="dark-toggle" onchange="toggleDark()">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

    <!-- Manage -->
    <div class="settings-section">
      <div class="settings-section-label">Manage</div>
      <button class="s-btn s-btn-outline" onclick="startReorder()">
        <span>↕</span> Reorder Exercises
      </button>
      <button class="s-btn s-btn-outline" onclick="startDelete()">
        <span>🗑</span> Delete Exercises
      </button>
    </div>

    <!-- Danger / Export -->
    <div class="settings-section">
      <div class="settings-section-label">Data</div>
      <button class="s-btn s-btn-red" onclick="promptClearAll()">
        <span>✕</span> Clear All &amp; Start Over
      </button>
            <button class="s-btn s-btn-outline" onclick="triggerImport()">
        <span>↑</span> Import .md
      </button>
      <input id="import-file" type="file" accept=".md,text/markdown" style="display:none" onchange="handleImport(this)">
      <button class="s-btn s-btn-blue" onclick="exportMd()">
        <span>↓</span> Export as .md
      </button>
    </div>
  </div>
</div>

<!-- ══ Confirm Modal ═════════════════════════════════════════════ -->
<div id="modal-overlay">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3 id="modal-title"></h3>
    <p  id="modal-body"></p>
    <div class="modal-btns">
      <button id="modal-cancel"  onclick="closeModal()">Cancel</button>
      <button id="modal-confirm" onclick="runModalConfirm()"></button>
    </div>
  </div>
</div>

<!-- ══ Confirm / Cancel Bar (reorder & delete modes) ════════════ -->
<div id="confirm-bar">
  <button id="cbar-cancel"  class="cbar-btn" onclick="cancelMode()">Cancel</button>
  <button id="cbar-confirm" class="cbar-btn" onclick="confirmMode()">Confirm</button>
</div>

<!-- ══ Header ════════════════════════════════════════════════════ -->
<header>
  <span id="app-title">L I F T E D</span>
  <button id="settings-btn" onclick="openSettings()" aria-label="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</header>

<!-- ══ Main ══════════════════════════════════════════════════════ -->
<div id="main">
  <!-- Saved exercises rendered here -->
  <div id="ex-list"></div>

  <!-- Active exercise entry -->
  <div id="current-ex">
    <input id="ex-title-input" type="text" placeholder="Exercise Title" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="sets-col-header">
      <span>Set</span>
      <span>Reps</span>
      <span>Weight</span>
    </div>
    <div id="current-sets"></div>
    <div class="action-row">
      <button id="btn-next" class="action-btn" onclick="nextExercise()" title="Next Exercise">
        <!-- Arrow-right with line -->
        <svg width="22" height="18" viewBox="0 0 22 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="20" y1="1" x2="20" y2="17"/>
          <line x1="1"  y1="9" x2="17" y2="9"/>
          <polyline points="11,3 17,9 11,15"/>
        </svg>
        <span style="font-size:0.85rem; font-weight:700; letter-spacing:0.5px">NEXT</span>
      </button>
      <button id="btn-add"  class="action-btn" onclick="addSet()" title="Add Set">
        <span class="btn-icon">+</span>
        <span style="font-size:0.85rem; font-weight:700; letter-spacing:0.5px">ADD SET</span>
      </button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════
let exercises   = [];   // [{ title, sets: [{reps, weight}] }]
let currentSets = [{ reps: '', weight: '' }];
let mode        = 'normal';  // 'normal' | 'reorder' | 'delete'
let isDark      = false;
let modalCb     = null;

// ═══════════════════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════════════════
function init() {
  load();
  render();
  renderCurrentSets();
}

function load() {
  try {
    const raw = localStorage.getItem('lifted');
    if (raw) {
      const d = JSON.parse(raw);
      exercises = d.exercises || [];
      isDark    = !!d.isDark;
    }
  } catch (_) {}
  applyDark(isDark);
}

function save() {
  try { localStorage.setItem('lifted', JSON.stringify({ exercises, isDark })); } catch (_) {}
}

// ═══════════════════════════════════════════════════════════
//  Dark Mode
// ═══════════════════════════════════════════════════════════
function applyDark(on) {
  isDark = on;
  document.documentElement.setAttribute('data-theme', on ? 'dark' : '');
  document.getElementById('dark-toggle').checked = on;
}

function toggleDark() {
  applyDark(document.getElementById('dark-toggle').checked);
  save();
}

// ═══════════════════════════════════════════════════════════
//  Render Saved Exercises
// ═══════════════════════════════════════════════════════════
function render() {
  const list = document.getElementById('ex-list');

  if (mode === 'reorder') { renderReorder(list); return; }
  if (mode === 'delete')  { renderDelete(list);  return; }

  if (!exercises.length) { list.innerHTML = ''; return; }

  list.innerHTML = exercises.map((ex, ei) => `
    <div class="ex-card">
      <div class="ex-card-title ${ex.title ? '' : 'untitled'}" onclick="toggleInsertBtn(this)">
        <span class="title-text" onclick="event.stopPropagation(); editExTitle(this, ${ei})">${ex.title ? esc(ex.title) : 'Untitled Exercise'}</span>
        <button class="insert-set-btn" onclick="event.stopPropagation(); insertSet(${ei})" title="Add set to this exercise">+</button>
      </div>
      <div class="sets-col-header">
        <span>Set</span><span>Reps</span><span>Weight</span>
      </div>
      ${ex.sets.map((s, si) => `
        <div class="set-row">
          <div class="set-num">${si + 1}</div>
          <input class="set-input" type="text" inputmode="decimal"
            value="${esc(s.reps)}" placeholder="—"
            onchange="updateSavedSet(${ei},${si},'reps',this.value)">
          <input class="set-input" type="text" inputmode="decimal"
            value="${esc(s.weight)}" placeholder="—"
            onchange="updateSavedSet(${ei},${si},'weight',this.value)">
        </div>
      `).join('')}
    </div>
  `).join('');
}

function updateSavedSet(ei, si, field, val) {
  exercises[ei].sets[si][field] = val;
  save();
}

function toggleInsertBtn(titleEl) {
  // On touch/mobile, hover doesn't apply — tap title to reveal the + button
  titleEl.classList.toggle('active-insert');
}

function editExTitle(spanEl, ei) {
  // Already editing
  if (spanEl.querySelector('input')) return;

  const current = exercises[ei].title || '';
  const input   = document.createElement('input');
  input.type      = 'text';
  input.className = 'title-edit';
  input.value     = current;
  input.maxLength = 200;
  input.autocomplete = 'off';
  input.spellcheck   = false;

  const commit = () => {
    const val = input.value.trim();
    exercises[ei].title = val;
    save();
    // Swap input back to span without full re-render
    const span = document.createElement('span');
    span.className = 'title-text';
    span.onclick   = e => { e.stopPropagation(); editExTitle(span, ei); };
    span.textContent = val || 'Untitled Exercise';
    const bar = input.closest('.ex-card-title');
    bar.classList.toggle('untitled', !val);
    input.replaceWith(span);
  };

  input.addEventListener('blur',    commit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } });

  spanEl.replaceWith(input);
  input.focus();
  input.select();
}

function insertSet(ei) {
  const sets = exercises[ei].sets;
  const prev = sets[sets.length - 1];
  sets.push({
    reps:   (prev && prev.reps)   ? prev.reps   : '',
    weight: (prev && prev.weight) ? prev.weight : '',
  });
  save();
  render();
  // Scroll the new row into view and focus its reps input
  setTimeout(() => {
    const cards = document.querySelectorAll('.ex-card');
    const card  = cards[ei];
    if (!card) return;
    const rows  = card.querySelectorAll('.set-row');
    const last  = rows[rows.length - 1];
    last?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    last?.querySelector('.set-input')?.focus();
    // Re-show the + button on the card we just edited
    card.querySelector('.ex-card-title')?.classList.add('active-insert');
  }, 60);
}

// ═══════════════════════════════════════════════════════════
//  Reorder Mode
// ═══════════════════════════════════════════════════════════
function renderReorder(list) {
  if (!exercises.length) {
    list.innerHTML = '<p class="mode-hint">No exercises to reorder.</p>';
    return;
  }
  list.innerHTML = exercises.map((ex, i) => `
    <div class="mode-card">
      <span class="mode-card-title">${ex.title ? esc(ex.title) : '<em style="opacity:.5">Untitled</em>'}</span>
      <div class="arrow-btns">
        <button class="arrow-btn" onclick="moveEx(${i},-1)" ${i === 0 ? 'disabled' : ''}>▲</button>
        <button class="arrow-btn" onclick="moveEx(${i}, 1)" ${i === exercises.length-1 ? 'disabled' : ''}>▼</button>
      </div>
    </div>
  `).join('');
}

function moveEx(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= exercises.length) return;
  [exercises[i], exercises[j]] = [exercises[j], exercises[i]];
  renderReorder(document.getElementById('ex-list'));
}

// ═══════════════════════════════════════════════════════════
//  Delete Mode
// ═══════════════════════════════════════════════════════════
function renderDelete(list) {
  if (!exercises.length) {
    list.innerHTML = '<p class="mode-hint">No exercises to delete.</p>';
    return;
  }
  list.innerHTML = exercises.map((ex, i) => `
    <div class="mode-card">
      <input class="del-check" type="checkbox" id="dc${i}" onchange="refreshDeleteBtn()">
      <label for="dc${i}" class="mode-card-title" style="cursor:pointer">
        ${ex.title ? esc(ex.title) : '<em style="opacity:.5">Untitled</em>'}
      </label>
    </div>
  `).join('');
}

function refreshDeleteBtn() {
  const n   = document.querySelectorAll('.del-check:checked').length;
  const btn = document.getElementById('cbar-confirm');
  btn.textContent = n > 0 ? `🗑  Delete (${n})` : '🗑  Delete Selected';
}

// ═══════════════════════════════════════════════════════════
//  Current Sets
// ═══════════════════════════════════════════════════════════
function flushCurrentInputs() {
  document.querySelectorAll('#current-sets .set-row').forEach((row, i) => {
    const [rIn, wIn] = row.querySelectorAll('.set-input');
    if (currentSets[i]) {
      currentSets[i].reps   = rIn ? rIn.value : '';
      currentSets[i].weight = wIn ? wIn.value : '';
    }
  });
}

function renderCurrentSets() {
  const c = document.getElementById('current-sets');
  c.innerHTML = currentSets.map((s, i) => `
    <div class="set-row">
      <div class="set-num">${i + 1}</div>
      <input class="set-input" type="text" inputmode="decimal"
        value="${esc(s.reps)}" placeholder="Reps">
      <input class="set-input" type="text" inputmode="decimal"
        value="${esc(s.weight)}" placeholder="lbs">
    </div>
  `).join('');
}

function addSet() {
  flushCurrentInputs();
  const prev = currentSets[currentSets.length - 1];
  const reps   = (prev && prev.reps)   ? prev.reps   : '';
  const weight = (prev && prev.weight) ? prev.weight : '';
  currentSets.push({ reps, weight });
  renderCurrentSets();
  setTimeout(() => {
    const rows = document.querySelectorAll('#current-sets .set-row');
    rows[rows.length - 1]?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    rows[rows.length - 1]?.querySelector('.set-input')?.focus();
  }, 60);
}

// ═══════════════════════════════════════════════════════════
//  Next Exercise
// ═══════════════════════════════════════════════════════════
function nextExercise() {
  flushCurrentInputs();
  const title = document.getElementById('ex-title-input').value.trim();
  const hasSets = currentSets.some(s => s.reps || s.weight);
  if (!title && !hasSets) return;

  exercises.push({ title, sets: currentSets.map(s => ({ ...s })) });
  save();

  // Reset
  document.getElementById('ex-title-input').value = '';
  currentSets = [{ reps: '', weight: '' }];
  render();
  renderCurrentSets();

  // Scroll active area into view
  setTimeout(() => {
    document.getElementById('current-ex').scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.getElementById('ex-title-input').focus();
  }, 60);
}

// ═══════════════════════════════════════════════════════════
//  Settings open/close
// ═══════════════════════════════════════════════════════════
function openSettings() {
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}
document.getElementById('settings-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('settings-overlay')) closeSettings();
});

// ═══════════════════════════════════════════════════════════
//  Mode helpers
// ═══════════════════════════════════════════════════════════
function startReorder() {
  closeSettings();
  mode = 'reorder';
  document.getElementById('current-ex').style.display = 'none';
  render();
  const btn = document.getElementById('cbar-confirm');
  btn.textContent = 'Confirm Order';
  btn.classList.remove('is-delete');
  document.getElementById('confirm-bar').classList.add('show');
}

function startDelete() {
  closeSettings();
  mode = 'delete';
  document.getElementById('current-ex').style.display = 'none';
  render();
  const btn = document.getElementById('cbar-confirm');
  btn.textContent = '🗑  Delete Selected';
  btn.classList.add('is-delete');
  document.getElementById('confirm-bar').classList.add('show');
}

function cancelMode() {
  mode = 'normal';
  document.getElementById('confirm-bar').classList.remove('show');
  document.getElementById('current-ex').style.display = '';
  render();
}

function confirmMode() {
  if (mode === 'reorder') {
    save();
    cancelMode();
  } else if (mode === 'delete') {
    const checked = [...document.querySelectorAll('.del-check:checked')];
    if (!checked.length) { cancelMode(); return; }
    const toRemove = new Set(checked.map(cb => parseInt(cb.id.replace('dc', ''))));
    exercises = exercises.filter((_, i) => !toRemove.has(i));
    save();
    cancelMode();
  }
}

// ═══════════════════════════════════════════════════════════
//  Clear All
// ═══════════════════════════════════════════════════════════
function promptClearAll() {
  closeSettings();
  showModal(
    'Clear All Data?',
    'This will permanently delete all logged exercises. This cannot be undone.',
    'Clear All',
    'var(--red)',
    () => {
      exercises   = [];
      currentSets = [{ reps: '', weight: '' }];
      document.getElementById('ex-title-input').value = '';
      save();
      render();
      renderCurrentSets();
    }
  );
}

// ═══════════════════════════════════════════════════════════
//  Export Markdown
// ═══════════════════════════════════════════════════════════
function exportMd() {
  closeSettings();
  flushCurrentInputs();

  const date = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  let md = `# Workout Log — ${date}\n\n`;

  const all = [...exercises];
  const curTitle = document.getElementById('ex-title-input').value.trim();
  const curHasData = currentSets.some(s => s.reps || s.weight);
  if (curTitle || curHasData) {
    all.push({ title: curTitle || 'Untitled', sets: currentSets });
  }

  if (!all.length) {
    md += '_No exercises logged._\n';
  } else {
    all.forEach(ex => {
      md += `## ${ex.title || 'Untitled Exercise'}\n\n`;
      md += `| Set | Reps | Weight |\n|:---:|:----:|:------:|\n`;
      ex.sets.forEach((s, i) => {
        md += `| ${i + 1} | ${s.reps || '—'} | ${s.weight || '—'} |\n`;
      });
      md += '\n';
    });
  }

  const blob = new Blob([md], { type: 'text/markdown' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `workout-${new Date().toISOString().slice(0,10)}.md`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════
//  Import Markdown
// ═══════════════════════════════════════════════════════════
function triggerImport() {
  closeSettings();
  const input = document.getElementById('import-file');
  input.value = '';   // allow re-selecting the same file
  input.click();
}

function handleImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const parsed = parseMd(e.target.result);
    if (!parsed.length) {
      showModal('Nothing Found', 'No exercises could be read from that file. Make sure it was exported from LIFTED.', 'OK', 'var(--blue)', () => {});
      return;
    }
    const hasExisting = exercises.length > 0 ||
      document.getElementById('ex-title-input').value.trim() ||
      currentSets.some(s => s.reps || s.weight);

    if (hasExisting) {
      showImportChoiceModal(parsed);
    } else {
      loadImport(parsed, false);
    }
  };
  reader.readAsText(file);
}

function parseMd(text) {
  const result = [];
  let current  = null;

  for (const raw of text.split('\n')) {
    const line = raw.trim();

    // Exercise heading: ## Title
    if (line.startsWith('## ')) {
      if (current) result.push(current);
      const title = line.slice(3).trim().replace(/<[^>]*>/g, '').slice(0, 200);
      current = { title, sets: [] };
      continue;
    }

    // Data row: | 1 | value | value |  (skip header and separator rows)
    if (current && line.startsWith('|')) {
      const cells = line.split('|').map(c => c.trim()).filter((_, i, a) => i > 0 && i < a.length - 1);
      if (cells.length < 3) continue;
      const setNum = cells[0];
      // Skip the column-header row (Set / Reps / Weight) and separator (---)
      if (/^[:\-]+$/.test(setNum) || setNum.toLowerCase() === 'set') continue;
      if (!/^\d+$/.test(setNum)) continue;

      const reps   = cells[1] === '—' ? '' : cells[1].replace(/<[^>]*>/g, '').slice(0, 20);
      const weight = cells[2] === '—' ? '' : cells[2].replace(/<[^>]*>/g, '').slice(0, 20);
      current.sets.push({ reps, weight });
    }
  }
  if (current) result.push(current);

  // Drop any exercises that ended up with no sets
  return result.filter(ex => ex.sets.length > 0);
}

function loadImport(parsed, append) {
  flushCurrentInputs();
  if (append) {
    // Save whatever is currently in progress first
    const curTitle   = document.getElementById('ex-title-input').value.trim();
    const curHasData = currentSets.some(s => s.reps || s.weight);
    if (curTitle || curHasData) {
      exercises.push({ title: curTitle || 'Untitled', sets: currentSets.map(s => ({ ...s })) });
    }
    exercises = [...exercises, ...parsed];
  } else {
    exercises = parsed;
    document.getElementById('ex-title-input').value = '';
    currentSets = [{ reps: '', weight: '' }];
    renderCurrentSets();
  }
  save();
  render();
}

function showImportChoiceModal(parsed) {
  const count = parsed.length;
  document.getElementById('modal-title').textContent = `Import ${count} Exercise${count !== 1 ? 's' : ''}?`;
  document.getElementById('modal-body').textContent  =
    'You already have a workout in progress. Would you like to replace it or append the imported exercises to the end?';

  // Reuse modal but swap buttons
  const btns = document.querySelector('.modal-btns');
  btns.innerHTML = `
    <button id="modal-cancel"  onclick="closeModal()" style="background:var(--surface2);color:var(--text);border:1px solid var(--border)">Cancel</button>
    <button onclick="closeModal(); loadImport(importPending, true)"  style="background:var(--blue);color:#fff;font-weight:700;flex:1;padding:12px;border:none;border-radius:10px">Append</button>
    <button onclick="closeModal(); loadImport(importPending, false)" style="background:var(--red);color:#fff;font-weight:700;flex:1;padding:12px;border:none;border-radius:10px">Replace</button>
  `;
  importPending = parsed;
  document.getElementById('modal-overlay').classList.add('open');
}

let importPending = null;
// ═══════════════════════════════════════════════════════════
function showModal(title, body, confirmLabel, confirmColor, cb) {
  document.getElementById('modal-title').textContent   = title;
  document.getElementById('modal-body').textContent    = body;
  const btn = document.getElementById('modal-confirm');
  btn.textContent       = confirmLabel;
  btn.style.background  = confirmColor;
  modalCb = cb;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalCb = null;
}
function runModalConfirm() {
  if (modalCb) modalCb();
  closeModal();
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ═══════════════════════════════════════════════════════════
//  Utils
// ═══════════════════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Boot ────
init();
</script>
